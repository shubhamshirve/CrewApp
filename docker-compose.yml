services:
  # ── MongoDB ─────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7.0
    container_name: crewbook-mongodb
    restart: unless-stopped
    volumes:
      - mongodb_data:/data/db
    networks:
      - crewbook-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Backend (FastAPI) ────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: crewbook-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      # Override MONGO_URL to use Docker service name instead of localhost
      - MONGO_URL=mongodb://mongodb:27017
    depends_on:
      mongodb:
        condition: service_healthy
    ports:
      - "8002:8001"
    networks:
      - crewbook-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/api/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── Frontend (React → nginx) ─────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Leave empty to use nginx proxy for /api (recommended)
        # Set to your server URL if deploying frontend/backend on separate domains
        REACT_APP_BACKEND_URL: ""
    container_name: crewbook-frontend
    restart: unless-stopped
    ports:
      - "3002:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - crewbook-net

volumes:
  mongodb_data:
    name: crewbook_mongodb_data

networks:
  crewbook-net:
    name: crewbook-network
    driver: bridge
