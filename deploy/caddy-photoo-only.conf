# /etc/caddy/Caddyfile
# Photoo standalone — app.photoo.in
#
# For use when Photoo is the ONLY app on the VPS (no co-hosted apps).
# The photoo-vps.sh deploy script writes this automatically.
# Copy it manually only if setting up Caddy by hand.
#
# Install:
#   cp /opt/photoo/deploy/caddy-photoo-only.conf /etc/caddy/Caddyfile
#   caddy validate --config /etc/caddy/Caddyfile
#   systemctl reload caddy
#
# Requirements:
#   • Photoo frontend container bound to 127.0.0.1:3000
#     (enforced by docker-compose.prod.yml)
#   • DNS A record:  app.photoo.in  →  45.196.196.115

{
    # Uncomment to receive Let's Encrypt certificate expiry notices:
    # email admin@photoo.in
    admin off
}

app.photoo.in {
    # Compress all responses
    encode gzip zstd

    reverse_proxy 127.0.0.1:3000 {
        header_up Host {host}
        header_up X-Real-IP {remote_host}
        header_up X-Forwarded-For {remote_host}
        header_up X-Forwarded-Proto {scheme}
        # Generous timeouts for file uploads and AI endpoints
        transport http {
            read_timeout  120s
            write_timeout 120s
        }
    }
}
