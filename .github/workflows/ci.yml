name: CI — Build, Push & Deploy

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/shubhamshirve/crewapp-backend
  FRONTEND_IMAGE: ghcr.io/shubhamshirve/crewapp-frontend

jobs:
  # ── Backend ──────────────────────────────────────────────────────────────────
  build-backend:
    name: Build & Push Backend
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Build Python wheels outside Docker (fast with GHA cache) ──────────
      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip wheels
        uses: actions/cache@v4
        with:
          path: backend/wheels
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Build wheels (compile once, cache forever)
        run: |
          pip wheel -r backend/requirements.txt --wheel-dir backend/wheels/ --quiet

      # ── Wrap pre-built wheels in a slim Python image (seconds) ────────────
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata (backend)
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.BACKEND_IMAGE }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push Backend Image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile.ci
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max

  # ── Frontend ─────────────────────────────────────────────────────────────────
  build-frontend:
    name: Build & Push Frontend
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Build React outside Docker (fast with GHA cache) ──────────────────
      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache npm packages
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Install dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps --prefer-offline

      - name: Build React app
        working-directory: frontend
        env:
          REACT_APP_BACKEND_URL: ""
          GENERATE_SOURCEMAP: "false"
          DISABLE_ESLINT_PLUGIN: "true"
          ESLINT_NO_DEV_ERRORS: "true"
          CI: "false"
        run: npm run build

      # ── Wrap pre-built files in Caddy (seconds, no npm in Docker) ─────────
      - name: Copy Caddyfile into build output
        run: cp frontend/Caddyfile frontend/build/Caddyfile

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata (frontend)
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.FRONTEND_IMAGE }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push Frontend Image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend/build
          file: ./frontend/Dockerfile.ci
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max

  # ── Deploy to VPS (only on push to main) ─────────────────────────────────────
  deploy:
    name: Deploy to VPS
    needs: [build-backend, build-frontend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Copy compose files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          source: "docker-compose.vps.yml"
          target: /opt/photoo

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          command_timeout: 10m
          script: |
            set -e
            cd /opt/photoo

            # ── Pre-flight checks ────────────────────────────────────────────
            echo "--- Pre-flight checks ---"

            if [ ! -f docker-compose.vps.yml ]; then
              echo "ERROR: docker-compose.vps.yml missing in /opt/photoo"
              exit 1
            fi
            echo "OK: docker-compose.vps.yml found"

            if ! docker info >/dev/null 2>&1; then
              echo "ERROR: Docker daemon is not running"
              exit 1
            fi
            echo "OK: Docker is running"

            if docker compose version >/dev/null 2>&1; then
              DC="docker compose"
            elif command -v docker-compose >/dev/null 2>&1; then
              DC="docker-compose"
            else
              echo "ERROR: Neither docker compose nor docker-compose found"
              exit 1
            fi
            echo "OK: Using '$DC'"

            # ── Create .env if missing ───────────────────────────────────────
            if [ ! -f backend/.env ]; then
              echo "backend/.env not found — creating with safe defaults"
              mkdir -p backend
              SEED_SECRET=$(openssl rand -hex 16)
              printf 'DB_NAME=crewbook_db\nJWT_SECRET=%s\nADMIN_DEFAULT_PASSWORD=Admin@123\nADMIN_SEED_SECRET=%s\n' \
                "$(openssl rand -hex 32)" "$SEED_SECRET" > backend/.env
              echo "OK: backend/.env created (ADMIN_SEED_SECRET=$SEED_SECRET)"
            else
              echo "OK: backend/.env exists"
              # Ensure ADMIN_SEED_SECRET is present (add if missing)
              if ! grep -q "ADMIN_SEED_SECRET" backend/.env; then
                SEED_SECRET=$(openssl rand -hex 16)
                printf '\nADMIN_SEED_SECRET=%s\n' "$SEED_SECRET" >> backend/.env
                echo "OK: Added ADMIN_SEED_SECRET to existing .env"
              fi
            fi

            # ── Pull latest images ───────────────────────────────────────────
            echo "--- Pulling images ---"
            docker pull ghcr.io/shubhamshirve/crewapp-backend:latest
            docker pull ghcr.io/shubhamshirve/crewapp-frontend:latest

            # ── Deploy ──────────────────────────────────────────────────────
            echo "--- Starting containers ---"
            # Stop any running stack first (handles mongo version change cleanly)
            $DC -f docker-compose.vps.yml down --remove-orphans 2>/dev/null || true
            $DC -f docker-compose.vps.yml up -d

            # ── Wait for backend to be healthy ──────────────────────────────
            echo "--- Waiting for backend to be ready ---"
            for i in $(seq 1 24); do
              if curl -sf http://localhost:8001/api/health >/dev/null 2>&1; then
                echo "OK: Backend is healthy"
                break
              fi
              echo "Waiting... ($i/24)"
              sleep 5
            done

            # ── Seed admin if not already seeded ────────────────────────────
            SEED_SECRET=$(grep ADMIN_SEED_SECRET backend/.env | cut -d= -f2)
            if [ -n "$SEED_SECRET" ]; then
              SEED_RESULT=$(curl -sf -X POST http://localhost:8001/api/admin/seed-admin \
                -H "X-Seed-Secret: $SEED_SECRET" 2>&1 || echo "seed_failed")
              echo "Seed result: $SEED_RESULT"
            fi

            docker image prune -f
            echo "--- Deployment complete ---"
            echo "Admin login: admin@photoo.in / Admin@123"
