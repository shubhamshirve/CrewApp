services:
  # ── MongoDB ─────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7.0
    container_name: crewbook-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: crewbook_db
    volumes:
      - mongodb_data:/data/db
    networks:
      - crewbook-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 512m

  # ── Backend (FastAPI) ────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: crewbook-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      # Override localhost values from .env with Docker-internal hostnames
      MONGO_URL: mongodb://mongodb:27017
      ENV: production
      # Uploads directory inside the container (mounted as named volume below)
      UPLOADS_DIR: /app/uploads
    depends_on:
      mongodb:
        condition: service_healthy
    ports:
      - "8001:8001"
    volumes:
      # Persist user-uploaded profile pictures across container restarts
      - uploads_data:/app/uploads
    networks:
      - crewbook-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/api/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512m

  # ── Frontend (React → Caddy) ─────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Leave empty so Caddy proxy handles /api — no hard-coded URL in the bundle
        REACT_APP_BACKEND_URL: ""
    container_name: crewbook-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - crewbook-net
    volumes:
      # Persist Caddy's ACME/TLS data across restarts
      - caddy_data:/data
      - caddy_config:/config
    deploy:
      resources:
        limits:
          memory: 128m

volumes:
  mongodb_data:
    name: crewbook_mongodb_data
  uploads_data:
    name: crewbook_uploads_data
  caddy_data:
    name: crewbook_caddy_data
  caddy_config:
    name: crewbook_caddy_config

networks:
  crewbook-net:
    name: crewbook-network
    driver: bridge
