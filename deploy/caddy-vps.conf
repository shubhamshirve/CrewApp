# /etc/caddy/Caddyfile
# Unified host Caddy for the temporary single-VPS setup that hosts both:
#   - Photoo  (app.photoo.in)   → 127.0.0.1:3000   (Docker: /opt/photoo)
#   - JVSapp    (app.mmpf.in)    → 127.0.0.1:8080   (Docker: /opt/jvsapp)
#
# When either app moves to its own VPS later (planned in 2–3 months), simply
# delete its block from this file — both apps' own repos stay deployable
# stand-alone on their new servers without any code changes.
#
# Prerequisites
# -------------
#  1.  DNS A records both pointing to this VPS:
#         app.photoo.in   -> 45.196.196.114
#         app.mmpf.in    -> 45.196.196.114
#  2.  JVSapp running with /opt/jvsapp/docker-compose.override.yml installed
#      (auto-generated by deploy/deploy.sh) so it binds 127.0.0.1:8080 instead of host :80.
#  3.  Photoo frontend running on 127.0.0.1:3000 (docker-compose.prod.yml).
#
# Install
# -------
#     cp deploy/caddy-vps.conf /etc/caddy/Caddyfile
#     caddy validate --config /etc/caddy/Caddyfile
#     systemctl reload caddy

{
    # Replace with a real address when ready (used only for ACME notices)
    # email admin@mmpf.in
    admin off
}

# ── Photoo ────────────────────────────────────────────────────────────────
app.photoo.in {
    encode gzip zstd
    reverse_proxy 127.0.0.1:3000 {
        header_up Host {host}
        header_up X-Real-IP {remote_host}
        header_up X-Forwarded-For {remote_host}
        header_up X-Forwarded-Proto {scheme}
        # Longer timeouts for AI endpoints and file uploads
        transport http {
            read_timeout  120s
            write_timeout 120s
        }
    }
}

# ── JVSapp ──────────────────────────────────────────────────────────────────
app.mmpf.in {
    encode gzip zstd
    reverse_proxy 127.0.0.1:8080 {
        header_up Host {host}
        header_up X-Real-IP {remote_host}
        header_up X-Forwarded-For {remote_host}
        header_up X-Forwarded-Proto {scheme}
    }
}
