# Production overrides for Photoo
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#
# Changes from base:
#  - Frontend binds to 127.0.0.1:3000 (host Caddy proxies in; external clients can't reach it directly)
#  - Backend NOT exposed to host (only reachable inside Docker network via backend:8001)
#  - MongoDB stays internal (already no ports in base)

services:
  backend:
    # Compose v2.24+ "reset" tag: clears the inherited `ports` list so the
    # backend container is reachable only via the Docker network (not the host).
    # Older Compose versions silently treat `ports: []` as a merge-no-op, leaving
    # 8001 exposed on the host — using !reset makes the intent explicit and
    # actually drops the port binding.
    ports: !reset null

  frontend:
    # Same reset, then re-declare the host bind we *do* want (localhost only).
    ports: !reset
      - "127.0.0.1:3000:80"
