# /etc/caddy/Caddyfile
# VPS: 45.196.196.114
# Handles automatic HTTPS (Let's Encrypt) for both apps.
#
# REQUIRED before using this file:
#   1. DNS A record: app.mmpf.in  → 45.196.196.114  (HTTPS for jvsapp)
#   2. DNS A record: crew.mmpf.in → 45.196.196.114  (CrewBook)
#   3. jvsapp container must be on 127.0.0.1:8080 (not 80)
#   4. CrewBook frontend container must be on 127.0.0.1:3000
#
# Install:
#   cp caddy-vps.conf /etc/caddy/Caddyfile
#   caddy validate --config /etc/caddy/Caddyfile
#   systemctl reload caddy

# ── Existing Jivdani App ──────────────────────────────────────────────────────
app.mmpf.in {
    encode gzip zstd

    reverse_proxy localhost:8080 {
        header_up Host {host}
        header_up X-Real-IP {remote_host}
        header_up X-Forwarded-For {remote_host}
        header_up X-Forwarded-Proto {scheme}
    }
}

# ── CrewBook ──────────────────────────────────────────────────────────────────
crew.mmpf.in {
    encode gzip zstd

    reverse_proxy localhost:3000 {
        header_up Host {host}
        header_up X-Real-IP {remote_host}
        header_up X-Forwarded-For {remote_host}
        header_up X-Forwarded-Proto {scheme}
        # Longer timeout for AI endpoints and file uploads
        transport http {
            read_timeout 120s
            write_timeout 120s
        }
    }
}
