# Standalone VPS compose file — optimised for 1 GB RAM.
# Uses pre-built GHCR images. No build context needed.

services:
  mongodb:
    image: mongo:4.4                     # 4.4 is lean; Mongo 7 needs 1GB+ alone
    # Cap WiredTiger cache at 256 MB (default is 50% of RAM = ~512 MB on 1 GB VPS)
    command: ["--wiredTigerCacheSizeGB", "0.25"]
    restart: unless-stopped
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: photoo_db
    healthcheck:
      # mongo:4.4 ships the `mongo` shell (not `mongosh`)
      test: ["CMD", "mongo", "--eval", "db.adminCommand('ping')", "--quiet"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - photoo-network

  backend:
    image: ghcr.io/shubhamshirve/crewapp-backend:latest
    # 1 worker instead of 2 — saves ~120 MB on a 1 GB VPS
    command: ["uvicorn", "server:app",
              "--host", "0.0.0.0", "--port", "8001",
              "--workers", "1",
              "--proxy-headers", "--forwarded-allow-ips", "*"]
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      MONGO_URL: mongodb://mongodb:27017
      ENV: production
      UPLOADS_DIR: /app/uploads
      DB_NAME: photoo_db
    volumes:
      - uploads_data:/app/uploads
    ports:
      - "8001:8001"
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8001/api/health')"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - photoo-network

  frontend:
    image: ghcr.io/shubhamshirve/crewapp-frontend:latest
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Persist Let's Encrypt certificates across container restarts.
      # Without these, Caddy re-provisions on every restart and risks hitting
      # Let's Encrypt rate limits (5 certs/domain/week).
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - photoo-network

volumes:
  mongodb_data:
  uploads_data:
  caddy_data:
  caddy_config:

networks:
  photoo-network:
    name: photoo-network
    driver: bridge
