<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#E05D26" />
  <title>Photoo — Offline</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0A0A0A;
      color: #F5F5F4;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
      gap: 0;
    }
    .logo {
      width: 72px;
      height: 72px;
      border-radius: 16px;
      margin-bottom: 1.5rem;
      opacity: 0.85;
    }
    .wifi-icon {
      font-size: 3rem;
      margin-bottom: 1rem;
      opacity: 0.5;
    }
    h1 {
      font-size: 1.4rem;
      font-weight: 700;
      color: #E05D26;
      margin-bottom: 0.5rem;
    }
    p {
      font-size: 0.9rem;
      color: #78716C;
      max-width: 260px;
      line-height: 1.6;
      margin-bottom: 1.75rem;
    }
    button {
      background: #E05D26;
      color: #fff;
      border: none;
      border-radius: 50px;
      padding: 0.7rem 1.75rem;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #C4501E; }
    button:active { transform: scale(0.97); }
    .hint {
      margin-top: 1.25rem;
      font-size: 0.75rem;
      color: #44403C;
    }
  </style>
</head>
<body>
  <img src="/icon-192.png" class="logo" alt="Photoo" />
  <div class="wifi-icon">&#x1F4F5;</div>
  <h1>You're Offline</h1>
  <p>Photoo needs an internet connection. Please check your network and try again.</p>
  <button onclick="window.location.reload()">Try Again</button>
  <p class="hint">Previously cached pages may still be available.</p>
</body>
</html>
