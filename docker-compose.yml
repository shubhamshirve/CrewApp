services:
  # ── MongoDB 4.4 ──────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:4.4
    container_name: photoo-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: photoo_db
    volumes:
      - mongodb_data:/data/db
    networks:
      - photoo-net
    healthcheck:
      # mongo:4.4 ships with the legacy `mongo` shell (not `mongosh`)
      test: ["CMD", "mongo", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 256m   # tuned for 1 GB VPS

  # ── Backend (FastAPI) ────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: photoo-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      # Override localhost values from .env with Docker-internal hostnames
      MONGO_URL: mongodb://mongodb:27017
      ENV: production
      # Uploads directory inside the container (mounted as named volume below)
      UPLOADS_DIR: /app/uploads
    depends_on:
      mongodb:
        condition: service_healthy
    ports:
      - "8001:8001"
    volumes:
      # Persist user-uploaded profile pictures across container restarts
      - uploads_data:/app/uploads
      # Mount scripts from repo root so seed_data.py / reset_db.py are available
      # inside the container without rebuilding the image.
      - ./scripts:/app/scripts:ro
    networks:
      - photoo-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/api/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 384m

  # ── Frontend (React → Caddy) ─────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Leave empty so Caddy proxy handles /api — no hard-coded URL in the bundle
        REACT_APP_BACKEND_URL: ""
    container_name: photoo-frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - photoo-net
    volumes:
      # Persist Caddy's ACME/TLS data across restarts
      - caddy_data:/data
      - caddy_config:/config
    deploy:
      resources:
        limits:
          memory: 128m

volumes:
  mongodb_data:
    name: photoo_mongodb_data
  uploads_data:
    name: photoo_uploads_data
  caddy_data:
    name: photoo_caddy_data
  caddy_config:
    name: photoo_caddy_config

networks:
  photoo-net:
    name: photoo-network
    driver: bridge
